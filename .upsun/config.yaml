# Upsun configuration for Pulse.
# Three runtime surfaces: web (static React build), api (FastAPI), and the
# queue worker (same image as api, different start command).
# Every branch gets a preview environment with its own PostgreSQL and Redis.

applications:
  api:
    type: "python:3.12"
    source:
      root: apps/api

    relationships:
      postgresql:
        service: postgresql
        endpoint: postgresql
      # Re-enable together with the postgresql-replica service below once
      # postgres-replica is an accepted service type (see note there).
      # postgresql-replica:
      #   service: postgresql-replica
      #   endpoint: postgresql
      redis:

    dependencies:
      python3:
        uv: "*"

    hooks:
      build: |
        set -e
        export UV_CACHE_DIR="$PLATFORM_CACHE_DIR/uv"
        uv sync --frozen --no-dev
      deploy: |
        set -e
        .venv/bin/alembic upgrade head

    web:
      commands:
        start: ".venv/bin/uvicorn pulse.main:app --host 0.0.0.0 --port $PORT"

    workers:
      queue:
        commands:
          start: ".venv/bin/arq pulse.worker.WorkerSettings"

    # Phase 3: enable the daily dashboard rollup.
    # crons:
    #   daily-rollup:
    #     spec: "H 3 * * *"
    #     commands:
    #       start: ".venv/bin/python -m pulse.jobs.enqueue_rollup"

  web:
    type: "nodejs:20"
    source:
      root: apps/web

    build:
      flavor: none

    hooks:
      build: |
        set -e
        npm ci
        npm run build

    web:
      commands:
        start: sleep infinity
      locations:
        "/":
          root: "dist"
          index: ["index.html"]
          passthru: "/index.html"
          expires: 5m
          rules:
            \.(js|css|svg|woff2?)$:
              expires: 1y

services:
  postgresql:
    type: "postgresql:17"
    configuration:
      databases:
        - main
      endpoints:
        postgresql:
          default_database: main
          privileges:
            main: admin
  # Read-only replica, per
  # https://docs.upsun.com/add-services/postgresql/postgresql-readonly-replication.html
  # Disabled for now: the platform validator rejects `postgres-replica` as a
  # service type even though the docs describe it (checked 2026-07). To
  # re-enable: uncomment this service, add a `replicator` endpoint with
  # `replication: true` to the postgresql service above, uncomment the
  # postgresql-replica relationship on the api app, and size the replica's
  # disk at least as large as the primary's (upsun resources:set).
  # The app-side read path (ReadSessionDep, DATABASE_REPLICA_URL) is already
  # in place and falls back to the primary until then.
  # postgresql-replica:
  #   type: "postgres-replica:17"
  #   configuration:
  #     endpoints:
  #       postgresql:
  #         default_database: main
  #   relationships:
  #     primary: postgresql:replicator  # The name `primary` is required.
  redis:
    type: "redis-persistent:7.2"

routes:
  "https://{default}/":
    type: upstream
    upstream: "web:http"
  "https://{default}/api":
    type: upstream
    upstream: "api:http"
    cache:
      enabled: false
